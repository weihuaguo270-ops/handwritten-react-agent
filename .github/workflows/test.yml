name: CI

on: [push, pull_request]

jobs:
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install lint tools
      run: pip install flake8
    - name: Lint
      run: flake8 src/ tests/ --max-line-length=100 --count

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install -e .
    - name: Test
      run: python test_all.py

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install react-agent
      run: pip install -e .
    - name: Clone & install llm-eval-engine
      run: |
        git clone --depth=1 https://github.com/weihuaguo270-ops/llm-eval-engine.git /tmp/llm-eval-engine
        pip install -e /tmp/llm-eval-engine
    - name: Run Agent → Eval integration
      run: python examples/agent_to_eval.py
    - name: Verify eval-engine scoring path
      run: python -c "
import sys; sys.path.insert(0, 'src')
from react_agent.eval.scorer import score_with_eval_engine
traj = {'session_id': 'ci_test', 'query': 'test', 'steps': [{'step': 0, 'thought': 'search', 'action': {'name': 'web_search', 'arguments': '{}'}, 'observation': 'result'}], 'final_answer': 'ok'}
result = score_with_eval_engine({'question': 'test', 'expected_tool': 'web_search'}, traj)
assert result is not None and result.get('eval_engine') is True
print(f'OK score={result["total"]}/{result["max_score"]}')
"
